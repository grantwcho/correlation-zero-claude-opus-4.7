schema_version: "2026-04-30"
agent_id: "opus-4-7-tool-agent"
kind: "agent-template"
name: "Opus 4.7 Tool Agent"
description: >
  Claude Opus 4.7 agent with Anthropic server-side web search, server-side web
  fetch, server-side code execution, local web fetch, file operations, bash,
  task sub-agent calls, and remote MCP connector passthrough.

runtime: python
entrypoint: agent.py
command: python agent.py
cwd: "."

response_formats:
  - freeform

metrics:
  - opus_tool_response

execution_target:
  language: python
  entrypoint: agent.py
  agent_class: OpusToolAgent
  method: freeform

dependency_declaration:
  python: ">=3.10"
  requirements_file: requirements.txt

external_apis:
  - name: Anthropic Messages API
    provider: Anthropic
    base_url: https://api.anthropic.com
    endpoint: /v1/messages
    auth_env: ANTHROPIC_API_KEY
    model_env: ANTHROPIC_MODEL
    default_model: claude-opus-4-7
  - name: Anthropic MCP Connector
    provider: Anthropic
    base_url: https://api.anthropic.com
    endpoint: /v1/messages
    beta_header: mcp-client-2025-11-20

capabilities:
  server_tools:
    - web_search_20260209
    - web_fetch_20260209
    - code_execution_20260120
  local_tools:
    - bash_20250124
    - WebFetch
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash
    - Task
    - str_replace_based_edit_tool
  mcp:
    enabled: true
    configuration:
      - MCP_SERVERS_JSON
      - MCP_SERVER_URL
      - MCP_SERVER_NAME
      - MCP_AUTH_TOKEN

operator_managed_access:
  secrets:
    - name: ANTHROPIC_API_KEY
      provider: Anthropic
      required: true
      purpose: Call Anthropic Messages API, server tools, Task sub-agent calls, and Haiku WebFetch summaries.
    - name: MCP_AUTH_TOKEN
      provider: Remote MCP server
      required: false
      purpose: Optional bearer token for a configured remote MCP server.
  optional_environment:
    - name: ANTHROPIC_MODEL
      default: claude-opus-4-7
      purpose: Override the default Claude Opus model id.
    - name: ANTHROPIC_WEBFETCH_MODEL
      default: claude-haiku-4-5-20251001
      purpose: Haiku model used for local WebFetch summaries.
    - name: ANTHROPIC_TIMEOUT_SECONDS
      default: "20"
      purpose: Per-request Anthropic timeout, capped at 20 seconds.
    - name: ANTHROPIC_TOTAL_TIMEOUT_SECONDS
      default: "27"
      purpose: Total freeform call timeout budget, capped at 27 seconds.
    - name: MCP_SERVERS_JSON
      purpose: JSON array of remote MCP server definitions for Anthropic MCP connector passthrough.

tags:
  - anthropic
  - opus
  - tools
  - web-search
  - web-fetch
  - mcp
