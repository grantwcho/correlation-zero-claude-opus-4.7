schema_version: "2026-04-30"
agent_id: "plain-anthropic-opus-agent"
kind: "agent-template"
name: "Plain Anthropic Opus Agent"
description: >
  Plain vanilla Anthropic Messages API agent. It sends the user's prompt to the
  configured Claude Opus model using ANTHROPIC_API_KEY and returns the model's
  text response.

runtime: python
entrypoint: agent.py
command: python agent.py
cwd: "."

response_formats:
  - freeform

metrics:
  - plain_anthropic_response

execution_target:
  language: python
  entrypoint: agent.py
  agent_class: PlainAnthropicOpusAgent
  method: freeform

dependency_declaration:
  python: ">=3.10"
  requirements_file: requirements.txt

external_apis:
  - name: Anthropic Messages API
    provider: Anthropic
    base_url: https://api.anthropic.com
    endpoint: /v1/messages
    auth_env: ANTHROPIC_API_KEY
    model_env: ANTHROPIC_MODEL
    default_model: claude-opus-4-7

operator_managed_access:
  secrets:
    - name: ANTHROPIC_API_KEY
      provider: Anthropic
      required: true
      purpose: Call the Anthropic Messages API.
  optional_environment:
    - name: ANTHROPIC_MODEL
      default: claude-opus-4-7
      purpose: Override the default Claude Opus model id.
    - name: ANTHROPIC_TIMEOUT_SECONDS
      default: "20"
      purpose: Anthropic request timeout, capped at 20 seconds to stay below the platform watchdog.

tags:
  - anthropic
  - opus
  - plain-llm
